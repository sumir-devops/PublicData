name: Update IPO Companies Daily

on:
  schedule:
    - cron: '15 1 * * *'  # runs daily at 00:15 UTC (05:45 AM NPT)
  workflow_dispatch:        # allows manual trigger from GitHub Actions UI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # opt into Node.js 24 now

jobs:
  fetch-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2        # latest — supports Node.js 24

      - name: Set up Python
        uses: actions/setup-python@v5.6.0    # latest — supports Node.js 24
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright requests
          playwright install chromium
          playwright install-deps chromium

      - name: Run IPO fetcher
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python fetch_and_push_ipoCompanies.py
